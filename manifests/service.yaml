apiVersion: v1
kind: Service
metadata:
  name: ipv6-site-enforcer
  namespace: ipv6-enforcer
  labels:
    app.kubernetes.io/name: ipv6-site-enforcer
    app.kubernetes.io/part-of: flatracoon
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ipv6-site-enforcer
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: health
      port: 8080
      targetPort: health
      protocol: TCP
